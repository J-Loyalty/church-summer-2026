<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 여름성경학교 · 새친구 이름표</title>
<style>
  :root{
    --navy:#123f63; --navy-2:#2a8cc4; --sky:#5bb4e6; --gold:#f0b34c; --gold-2:#e79a2b;
    --gold-soft:#ffe6b0; --ink:#123048; --muted:#5c7488; --line:#b7cee0;
    --paper:#ffffff; --paper-2:#eff7fd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard","Malgun Gothic",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink); background:#dcecf7; line-height:1.35;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 화면 전용 안내바 ── */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:10px 16px; background:var(--navy); color:#fff; border-bottom:3px solid var(--gold);
  }
  .topbar .brand{font-weight:700; font-size:15px;}
  .topbar .brand small{display:block; font-weight:400; font-size:11px; opacity:.8;}
  .spacer{flex:1;}
  button{
    font-family:inherit; cursor:pointer; border:0; border-radius:8px;
    background:var(--navy-2); color:#fff; padding:8px 14px; font-size:14px; font-weight:600;
  }
  button:hover{background:#3197d1;}
  button.ghost{background:transparent; border:1px solid rgba(255,255,255,.4);}
  .hint{max-width:210mm; margin:14px auto 0; padding:0 6mm; font-size:12.5px; color:var(--muted);}

  /* ── A4 시트 (2열 × 5행 = 10장) ── */
  .sheet{
    width:210mm; min-height:297mm; margin:14px auto; padding:8mm;
    background:#fff; box-shadow:0 6px 24px rgba(15,42,67,.12);
    display:grid; grid-template-columns:repeat(2,90mm); grid-auto-rows:54mm;
    gap:5mm 6mm; justify-content:center; align-content:center;
  }

  /* ── 이름표 (90 × 54mm) ── */
  .tag{
    position:relative; overflow:hidden; width:90mm; height:54mm;
    border:1.4px dashed #a7c2d8; border-radius:12px;
    background:linear-gradient(180deg,var(--paper),var(--paper-2));
    display:flex; flex-direction:column;
  }
  .tag-band{
    position:relative; flex:0 0 auto;
    background:linear-gradient(120deg,var(--navy) 0%,#1b5f8f 55%,var(--sky) 130%);
    color:#fff; padding:5px 12px 8px; display:flex; align-items:center; gap:9px;
  }
  .tag-band .sail{font-size:19px; line-height:1; filter:drop-shadow(0 1px 1px rgba(0,0,0,.25));}
  .tag-band .bt{display:flex; flex-direction:column; line-height:1.15;}
  .tag-band .bt .k{font-size:8px; font-weight:700; letter-spacing:.12em; opacity:.82;}
  .tag-band .bt .t{font-size:14px; font-weight:800;}
  .tag-band .hi{
    margin-left:auto; font-size:9px; font-weight:800; color:#fff;
    background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.5);
    border-radius:999px; padding:2px 9px; letter-spacing:.02em;
  }
  .wave{position:absolute; left:0; right:0; bottom:-1px; width:100%; height:8px; display:block;}

  .tag-body{
    position:relative; flex:1; display:flex; flex-direction:column; justify-content:center; gap:7px;
    padding:6px 14px 8px;
  }
  .tag-body .wm{position:absolute; right:8px; bottom:2px; font-size:38px; line-height:1; opacity:.06;}

  .fld{display:flex; align-items:flex-end; gap:9px;}
  .fld .lbl{
    flex:0 0 auto; background:var(--navy); color:#fff; font-weight:800; text-align:center;
    border-radius:8px; padding:3px 0; letter-spacing:.06em;
  }
  .fld .line{flex:1; border-bottom:2px solid var(--line);}

  /* 학년: 조금 작게 / 이름: 크게 */
  .fld.grade .lbl{width:15mm; font-size:11px;}
  .fld.grade .line{height:9mm;}
  .fld.name .lbl{width:15mm; font-size:11px;}
  .fld.name .line{height:13mm;}

  @media screen and (max-width:820px){
    .sheet{width:100%; min-height:auto; grid-template-columns:1fr;}
    .tag{width:100%;}
  }

  /* ── 인쇄 ── */
  @page{ size:A4 portrait; margin:0; }
  @media print{
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    body{background:#fff;}
    .topbar,.hint{display:none !important;}
    .sheet{margin:0; box-shadow:none; width:210mm; min-height:297mm;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">2026 여름성경학교 · 새친구 이름표<small>90×54mm · A4 1장 = 10장 · 학년·이름은 네임펜으로 직접 작성</small></div>
  <div class="spacer"></div>
  <button class="ghost" onclick="location.href='index.html'">🏠 목록</button>
  <button onclick="window.print()">🖨 인쇄</button>
</header>

<div class="hint">💡 인쇄 팁 — A4 세로, 배율 100%(“실제 크기”), 여백 없음/최소, <b>배경 그래픽 켜기</b>. 한 장에 <b>10개</b>(2열×5행, 각 90×54mm)로 목걸이 홀더 규격에 맞춰 배치했습니다. 점선을 따라 자른 뒤 홀더에 끼우고, <b>학년·이름은 네임펜으로 직접</b> 적어 목에 걸어주세요.</div>

<main class="sheet" id="sheet"></main>

<script>
  const WAVE = `<svg class="wave" viewBox="0 0 100 8" preserveAspectRatio="none">
    <path d="M0 3.5 C 14 8, 24 -1, 38 3.5 S 66 8, 82 3.5 S 96 5.5, 100 3.5 L100 8 L0 8 Z" fill="#ffffff"/></svg>`;

  function tagHTML(){
    return `<section class="tag">
      <div class="tag-band">
        <span class="sail">⛵</span>
        <div class="bt"><span class="k">2026 여름성경학교</span><span class="t">믿음의 항해</span></div>
        <span class="hi">환영해요!</span>
        ${WAVE}
      </div>
      <div class="tag-body">
        <span class="wm">🧭</span>
        <div class="fld grade"><span class="lbl">학년</span><span class="line"></span></div>
        <div class="fld name"><span class="lbl">이름</span><span class="line"></span></div>
      </div>
    </section>`;
  }

  document.getElementById("sheet").innerHTML = Array.from({length:10}, tagHTML).join("");
</script>
</body>
</html>
