<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 여름성경학교 · 접수 미션 카드</title>
<style>
  :root{
    --navy:#123f63; --navy-2:#2a8cc4; --sky:#5bb4e6; --gold:#f0b34c; --gold-2:#e79a2b;
    --gold-soft:#ffe6b0; --ink:#123048; --muted:#5c7488; --line:#cfe1f0; --sticker:#e79a2b;
    --paper:#ffffff; --paper-2:#eff7fd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard","Malgun Gothic",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink); background:#dcecf7; line-height:1.35;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 화면 전용 안내바 ── */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:10px 16px; background:var(--navy); color:#fff; border-bottom:3px solid var(--gold);
  }
  .topbar .brand{font-weight:700; font-size:15px;}
  .topbar .brand small{display:block; font-weight:400; font-size:11px; opacity:.8;}
  .spacer{flex:1;}
  button{
    font-family:inherit; cursor:pointer; border:0; border-radius:8px;
    background:var(--navy-2); color:#fff; padding:8px 14px; font-size:14px; font-weight:600;
  }
  button:hover{background:#3197d1;}
  button.ghost{background:transparent; border:1px solid rgba(255,255,255,.4);}
  .hint{max-width:210mm; margin:14px auto 0; padding:0 6mm; font-size:12.5px; color:var(--muted);}

  /* ── A4 시트 ── */
  .sheet{
    width:210mm; min-height:297mm; margin:14px auto; padding:7mm 7mm;
    background:#fff; box-shadow:0 6px 24px rgba(15,42,67,.12);
    display:grid; grid-template-columns:1fr 1fr; grid-template-rows:repeat(3,1fr);
    gap:5mm;
  }

  /* ── 카드(승선권) ── */
  .card{
    position:relative; overflow:hidden;
    border:1.5px dashed #a7c2d8; border-radius:14px;
    background:linear-gradient(180deg,var(--paper),var(--paper-2));
    display:flex; flex-direction:column;
  }

  /* 헤더 밴드 */
  .ticket-head{
    position:relative; flex:0 0 auto;
    background:linear-gradient(120deg,var(--navy) 0%,#1b5f8f 55%,var(--sky) 130%);
    color:#fff; padding:7px 12px 12px; display:flex; align-items:center; gap:9px;
  }
  .ticket-head .sail{
    font-size:19px; line-height:1; flex:0 0 auto;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.25));
  }
  .ticket-head .head-txt{display:flex; flex-direction:column; line-height:1.15;}
  .ticket-head .kicker{font-size:8px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; opacity:.82;}
  .ticket-head .title{font-size:15px; font-weight:800; letter-spacing:.01em;}
  .ticket-head .stamp{
    margin-left:auto; align-self:flex-start; font-size:7.5px; font-weight:800; letter-spacing:.12em;
    border:1.4px solid rgba(255,255,255,.7); color:#fff; border-radius:5px;
    padding:2px 6px; transform:rotate(3deg); opacity:.9;
  }
  /* 헤더 하단 물결 */
  .wave{position:absolute; left:0; right:0; bottom:-1px; width:100%; height:9px; display:block;}

  /* 본문 */
  .ticket-body{
    position:relative; flex:1; display:flex; flex-direction:column;
    padding:9px 12px 10px;
  }
  /* 나침반 워터마크 */
  .ticket-body .wm{
    position:absolute; right:6px; bottom:4px; font-size:44px; line-height:1;
    opacity:.06; pointer-events:none; user-select:none;
  }

  .name-row{
    display:flex; align-items:center; gap:7px; margin:1px 0 8px;
    font-size:11px; font-weight:700; color:var(--ink);
  }
  .name-row .lbl{
    flex:0 0 auto; background:var(--navy); color:#fff; font-size:9px; font-weight:800;
    padding:2px 9px; border-radius:999px; letter-spacing:.04em;
  }
  .name-row .line{flex:1; border-bottom:1.6px dotted #b7cee0; height:16px;}

  /* 미션 = 항로 */
  ul.missions{
    list-style:none; margin:0; padding:0 0 0 2px; position:relative;
    display:flex; flex-direction:column; justify-content:space-between; flex:1;
  }
  ul.missions::before{
    content:""; position:absolute; left:9px; top:9px; bottom:9px;
    border-left:2px dotted var(--sky); z-index:0;
  }
  ul.missions li{display:flex; align-items:center; gap:8px; position:relative; z-index:1;}
  .mno{
    flex:0 0 auto; width:19px; height:19px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--sky),var(--navy-2));
    color:#fff; font-size:10.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 2.5px var(--paper), 0 1px 2px rgba(15,42,67,.28);
  }
  .mtxt{flex:1; font-size:11px; font-weight:600; line-height:1.2;}
  .mtxt .emo{margin-right:3px;}

  /* 스티커 칸 = 창문(포트홀) */
  .stbox{
    flex:0 0 auto; width:12mm; height:12mm; border-radius:9px;
    border:1.8px dashed var(--sticker);
    background:
      radial-gradient(circle at 50% 40%,#fff8ea 0 42%,transparent 43%),
      repeating-linear-gradient(45deg,#fffdf7,#fffdf7 4px,#fff5e2 4px,#fff5e2 8px);
    box-shadow:inset 0 0 0 2px rgba(231,154,43,.14);
    display:flex; align-items:center; justify-content:center;
    font-size:7.5px; color:#b9781a; font-weight:800; text-align:center; line-height:1.12;
  }
  .backtag{
    flex:0 0 auto; width:12mm; height:12mm; border-radius:9px;
    background:linear-gradient(180deg,var(--gold-soft),#ffd98a);
    color:#7a5410; font-size:8px; font-weight:800;
    display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.15;
    box-shadow:inset 0 0 0 1.5px rgba(122,84,16,.18);
  }

  .card-foot{
    margin-top:8px; text-align:center;
    background:linear-gradient(180deg,#fff4dd,#ffe9c2);
    border:1.4px solid var(--gold); border-radius:9px;
    padding:5px 8px; font-size:9px; font-weight:800; color:#8a5a10;
  }
  .card-foot .pen{color:var(--gold-2);}

  /* ── 뒷면(기도) ── */
  .card.back .ticket-head{
    background:linear-gradient(120deg,#7a5aa8 0%,#9270bd 55%,#c39fe0 130%);
  }
  .pray-intro{font-size:9px; color:var(--muted); margin:1px 0 7px; line-height:1.35;}
  .pray-wrap{flex:1; display:flex; flex-direction:column; gap:8px;}
  .pray-block{flex:1; display:flex; flex-direction:column; min-height:0;}
  .plabel{
    align-self:flex-start; color:#fff; font-size:9px; font-weight:800;
    padding:2px 10px; border-radius:999px; letter-spacing:.02em; margin-bottom:4px;
  }
  .plabel.friend{background:#7a5aa8;}
  .plabel.me{background:#d0892f;}
  .pray-name{display:flex; align-items:center; gap:6px; margin:0 0 5px; font-size:9.5px; font-weight:700; color:var(--ink);}
  .pray-name .nm-lbl{flex:0 0 auto; color:#7a5aa8;}
  .pray-name .nm-line{flex:1; border-bottom:1.5px dotted #cdbbe4; height:14px;}
  .pray-lines{
    flex:1; border-radius:9px; border:1.4px solid #e2d6f1; background:#faf7fe;
  }
  .pray-block.me .pray-lines{border-color:#f0dcbf; background:#fdf7ee;}

  @media screen and (max-width:820px){
    .sheet{width:100%; min-height:auto; grid-template-rows:none;}
  }

  /* ── 인쇄 ── */
  @page{ size:A4 portrait; margin:0; }
  @media print{
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    body{background:#fff;}
    .topbar,.hint{display:none !important;}
    .sheet{margin:0; box-shadow:none; width:210mm; min-height:297mm; page-break-after:always;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">2026 여름성경학교 · 접수 미션 카드<small>A4 1장 = 6명 · 미션 5개(스티커 4개+기도제목) 완료 시 볼펜 교환</small></div>
  <div class="spacer"></div>
  <button class="ghost" onclick="location.href='index.html'">🏠 목록</button>
  <button onclick="window.print()">🖨 인쇄</button>
</header>

<div class="hint">💡 인쇄 팁 — A4 세로, 배율 100%(“실제 크기”), 여백 없음/최소, <b>배경 그래픽 켜기</b>. 전체 <b>2페이지</b>(1p 앞면=미션 · 2p 뒷면=기도)이니 <b>양면 인쇄</b>하면 카드마다 앞·뒤가 채워집니다(뒷면은 6칸 모두 같은 내용이라 넘김 방향과 무관하게 잘 맞습니다). 점선을 따라 자르면 6장. 인원(약 50명) 기준 <b>9장</b> 출력이면 여유분 포함 54장입니다.</div>

<main class="sheet" id="sheet"></main>
<main class="sheet" id="sheetBack"></main>

<script>
  const MISSIONS = [
    { emo:"📸", txt:"포토존에서 사진 찍기" },
    { emo:"👕", txt:"티셔츠 환복 + 짐 정리" },
    { emo:"🙋", txt:"담임선생님 찾아 인사 <span style='font-size:8px;font-weight:500;color:#5c7488'>(안 계시면 목사님께)</span>" },
    { emo:"📖", txt:"오늘의 말씀 듣기" },
    { emo:"📝", txt:"뒷면에 기도제목 적기", noSticker:true },
  ];

  const WAVE = `<svg class="wave" viewBox="0 0 100 9" preserveAspectRatio="none">
    <path d="M0 4 C 14 9, 24 -1, 38 4 S 66 9, 82 4 S 96 6, 100 4 L100 9 L0 9 Z" fill="#ffffff"/></svg>`;

  function cardHTML(){
    const rows = MISSIONS.map((m,i)=>`
      <li>
        <span class="mno">${i+1}</span>
        <span class="mtxt"><span class="emo">${m.emo}</span>${m.txt}</span>
        ${m.noSticker ? `<span class="backtag">뒷면<br>작성</span>` : `<span class="stbox">스티커<br>붙이기</span>`}
      </li>`).join("");
    return `<section class="card">
      <div class="ticket-head">
        <span class="sail">⛵</span>
        <div class="head-txt">
          <span class="kicker">믿음의 항해 · 2026</span>
          <span class="title">접수 미션 승선권</span>
        </div>
        <span class="stamp">BOARDING</span>
        ${WAVE}
      </div>
      <div class="ticket-body">
        <span class="wm">🧭</span>
        <div class="name-row"><span class="lbl">이름</span><span class="line"></span></div>
        <ul class="missions">${rows}</ul>
        <div class="card-foot">🎁 미션 5개(스티커 4개 + 기도제목) 완료 → <span class="pen">볼펜 받는 곳</span>에 제출!</div>
      </div>
    </section>`;
  }

  function backCardHTML(){
    return `<section class="card back">
      <div class="ticket-head">
        <span class="sail">🙏</span>
        <div class="head-txt">
          <span class="kicker">믿음의 항해 · 함께 기도해요</span>
          <span class="title">기도 노트</span>
        </div>
        ${WAVE}
      </div>
      <div class="ticket-body">
        <span class="wm">⚓</span>
        <div class="pray-intro">기도할 내용을 적어 보아요. 우리 함께 서로를 위해 기도해요!</div>
        <div class="pray-wrap">
          <div class="pray-block friend">
            <span class="plabel friend">🙏 친구를 위한 기도</span>
            <div class="pray-name"><span class="nm-lbl">친구 이름</span><span class="nm-line"></span></div>
            <div class="pray-lines"></div>
          </div>
          <div class="pray-block me">
            <span class="plabel me">💛 나를 위한 기도</span>
            <div class="pray-lines"></div>
          </div>
        </div>
      </div>
    </section>`;
  }

  document.getElementById("sheet").innerHTML = Array.from({length:6}, cardHTML).join("");
  document.getElementById("sheetBack").innerHTML = Array.from({length:6}, backCardHTML).join("");
</script>
</body>
</html>
