<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 여름성경학교 천로역정 큐시트</title>
<style>
  :root{
    --navy:#155a87; --navy-2:#2a8cc4; --gold:#f0b34c; --gold-soft:#ffe2a8;
    --bg:#eaf4fb; --card:#ffffff; --ink:#123048; --muted:#587288;
    --line:#d3e4f1; --chk:#8fb0c9; --warn-bg:#fff4e0; --warn-line:#e0a94a; --warn-ink:#7a5410;
    --accent-bg:#e1f0fb; --say-bg:#f4fbee; --say-line:#7fb03a; --say-ink:#38541a;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --navy:#134a70; --navy-2:#1e628f; --gold:#eab659; --gold-soft:#f4d290;
      --bg:#0f1d29; --card:#17232f; --ink:#e7edf3; --muted:#a6b7c7;
      --line:#26333f; --chk:#4a5c6d; --warn-bg:#2c2416; --warn-line:#b58236; --warn-ink:#e8c583;
      --accent-bg:#152436; --say-bg:#1a2a17; --say-line:#5f8a2f; --say-ink:#cfe6ac;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard","Malgun Gothic",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 상단 바 (화면 전용) ── */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:10px 16px; background:var(--navy); color:#fff;
    border-bottom:3px solid var(--gold);
  }
  .topbar .brand{font-weight:700; font-size:15px; letter-spacing:.02em;}
  .topbar .brand small{display:block; font-weight:400; font-size:11px; opacity:.75; letter-spacing:.03em;}
  .spacer{flex:1;}
  .nav-btns{display:flex; align-items:center; gap:6px;}
  button{
    font-family:inherit; cursor:pointer; border:0; border-radius:8px;
    background:var(--navy-2); color:#fff; padding:8px 12px; font-size:14px; font-weight:600;
  }
  button:hover{background:#3197d1;}
  button.ghost{background:transparent; border:1px solid rgba(255,255,255,.35);}
  .counter{font-variant-numeric:tabular-nums; font-weight:700; min-width:58px; text-align:center;}
  .counter b{color:var(--gold-soft);}

  /* 점프 칩 */
  .jump{display:flex; gap:6px; overflow-x:auto; padding:8px 16px; background:var(--navy-2);}
  .jump::-webkit-scrollbar{height:6px;}
  .jump::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25); border-radius:3px;}
  .chip{
    flex:0 0 auto; font-size:12px; font-weight:600; color:#cdd9e5;
    background:rgba(255,255,255,.08); border:1px solid transparent;
    padding:5px 9px; border-radius:999px; cursor:pointer; white-space:nowrap;
  }
  .chip:hover{background:rgba(255,255,255,.18);}
  .chip.on{background:var(--gold); color:var(--navy); border-color:var(--gold);}

  /* ── 슬롯(페이지) ── */
  .stage{padding:22px 16px 60px;}
  .slot{
    display:none;
    max-width:820px; margin:0 auto; background:var(--card);
    border:1px solid var(--line); border-radius:16px; overflow:hidden;
    box-shadow:0 6px 24px rgba(15,42,67,.10);
  }
  .slot.active{display:block; animation:fade .18s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  .slot-head{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff; padding:20px 26px; position:relative;
  }
  .slot-head .idx{
    position:absolute; top:16px; right:22px; font-size:12px; letter-spacing:.08em;
    opacity:.7; font-weight:600;
  }
  .slot-head .time{
    font-size:32px; font-weight:800; letter-spacing:.01em;
    display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
  }
  .slot-head .tag{
    font-size:11px; font-weight:700; background:var(--gold); color:var(--navy);
    padding:3px 9px; border-radius:999px; letter-spacing:.03em; align-self:center;
  }
  .slot-head .title{font-size:22px; font-weight:700; margin-top:4px;}
  .meta{display:flex; flex-wrap:wrap; gap:8px 18px; margin-top:12px; font-size:14px;}
  .meta span{display:inline-flex; align-items:center; gap:6px; opacity:.95;}
  .meta .k{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; opacity:.65;}

  .slot-body{padding:22px 26px 26px;}
  .block{margin-bottom:18px;}
  .block:last-child{margin-bottom:0;}
  .block > .label{
    font-size:12px; font-weight:800; letter-spacing:.05em; color:var(--muted);
    text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .block > .label::before{content:""; width:14px; height:2px; background:var(--gold); border-radius:2px;}

  ul.steps{margin:0; padding:0; list-style:none;}
  ul.steps li{
    position:relative; padding:6px 0 6px 22px; font-size:16px; border-bottom:1px dashed var(--line);
  }
  ul.steps li:last-child{border-bottom:0;}
  ul.steps li::before{
    content:""; position:absolute; left:4px; top:14px; width:7px; height:7px;
    background:var(--navy-2); border-radius:50%;
  }

  ul.check{margin:0; padding:0; list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:6px 14px;}
  ul.check li{position:relative; padding:6px 0 6px 28px; font-size:15px;}
  ul.check li::before{
    content:""; position:absolute; left:2px; top:6px; width:16px; height:16px;
    border:2px solid var(--chk); border-radius:4px;
  }

  .note{
    background:var(--warn-bg); border:1px solid var(--warn-line); border-left-width:4px;
    border-radius:8px; padding:12px 14px; font-size:14.5px; color:var(--warn-ink);
  }
  .note b{color:var(--warn-ink);}
  .note .h{font-weight:800; margin-right:6px;}
  .note ul{margin:6px 0 0; padding-left:18px;}
  .note li{margin:3px 0;}

  /* 진행 멘트 (읽는 대본) */
  .say{
    background:var(--say-bg); border:1px solid var(--say-line); border-left-width:4px;
    border-radius:8px; padding:6px 16px;
  }
  .say ul{margin:0; padding:0; list-style:none;}
  .say li{
    position:relative; padding:10px 0 10px 30px; font-size:16.5px; line-height:1.62;
    border-bottom:1px dashed var(--line); color:var(--ink);
  }
  .say li:last-child{border-bottom:0;}
  .say li::before{content:"🎤"; position:absolute; left:0; top:10px; font-size:15px;}
  .say .cue{
    display:inline-block; font-size:11.5px; font-weight:800; color:var(--say-ink);
    background:rgba(127,176,58,.16); border-radius:5px; padding:1px 7px; margin-right:7px;
    letter-spacing:.03em; vertical-align:middle;
  }
  .block > .label.say-label::before{background:var(--say-line);}

  .info{display:flex; flex-direction:column; gap:6px; font-size:15px;}
  .info div{display:flex; gap:8px;}
  .info .k{font-weight:700; color:var(--muted); flex:0 0 64px;}

  .people{font-size:14px; color:var(--muted); margin-top:-4px; margin-bottom:8px;}
  .ref{font-size:13px; color:var(--muted);}
  .ref a{color:#2a6db0;}

  /* 순환 시간표 */
  .tbl-wrap{overflow-x:auto;}
  table.rot{border-collapse:collapse; width:100%; font-size:13px; font-variant-numeric:tabular-nums;}
  table.rot th, table.rot td{border:1px solid var(--line); padding:5px 7px; text-align:center; white-space:nowrap;}
  table.rot thead th{background:var(--accent-bg); color:var(--ink); font-weight:700;}
  table.rot tbody td:first-child{font-weight:600; color:var(--muted); text-align:left;}
  table.rot .wait{color:var(--muted); background:var(--accent-bg);}

  /* 하단 이동 (화면 전용) */
  .footnav{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; align-items:center; z-index:20;
    background:var(--navy); color:#fff; padding:8px 10px; border-radius:999px;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
  }
  .footnav .counter{color:#fff;}
  .hint{text-align:center; font-size:12px; color:var(--muted); margin:18px 0 0;}

  /* ── 모바일 반응형 (화면 전용) ── */
  @media screen and (max-width:640px){
    .topbar{padding:8px 12px; gap:8px;}
    .topbar .brand{font-size:13.5px;}
    .topbar .brand small{font-size:10px;}
    .nav-btns{gap:4px;}
    button{padding:7px 10px; font-size:13px;}
    .jump{padding:7px 12px;}
    .stage{padding:16px 10px 88px;}
    .slot-head{padding:16px 16px;}
    .slot-head .idx{top:12px; right:14px; font-size:11px;}
    .slot-head .time{font-size:24px; gap:8px;}
    .slot-head .title{font-size:18px;}
    .meta{gap:6px 12px; font-size:13px;}
    .slot-body{padding:16px 16px 20px;}
    ul.steps li{font-size:15px; padding-left:20px;}
    ul.check{grid-template-columns:1fr 1fr; gap:5px 10px;}
    ul.check li{font-size:14px;}
    .say li{font-size:15.5px; padding-left:28px;}
    .info{font-size:14px;}
    .note{font-size:13.5px; padding:10px 12px;}
    table.rot{font-size:12px;}
    table.rot th, table.rot td{padding:4px 5px;}
    .footnav{bottom:12px; padding:7px 9px;}
  }
  @media screen and (max-width:380px){
    ul.check{grid-template-columns:1fr;}
    .slot-head .time{font-size:21px;}
    .slot-head .title{font-size:16.5px;}
  }

  /* ── 인쇄: 한 슬롯 = 한 페이지 ── */
  @page{ size:A4; margin:14mm; }
  @media print{
    body{background:#fff;}
    .topbar,.jump,.footnav,.hint{display:none !important;}
    .stage{padding:0;}
    .slot{
      display:block !important; max-width:none; margin:0 0 0 0;
      border:1.5px solid #333; border-radius:10px; box-shadow:none;
      page-break-after:always; break-after:page;
    }
    .slot:last-child{page-break-after:auto; break-after:auto;}
    .slot-head{background:#155a87 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    .slot-head .tag,.block>.label::before{background:#f0b34c !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    .note{background:#fff4e0 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    .say{background:#f4fbee !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    table.rot thead th, table.rot .wait{background:#e1f0fb !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    ul.check{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>

        "말씀 암송 릴레이 — 이 주의 암송 말씀 / 방금 지난 코스 성구를 한 사람씩 이어 외치기",
        "은혜 한마디 — 방금 통과한 코스 소감을 조원들이 한마디씩",
        "재정비 — 물·간단한 간식으로 수분 보충, 다음 코스 짧게 예고",
      ]},
      {t:"say", label:"진행 멘트 🎤", items:[
        "<span class='cue'>도착</span>“순례하느라 애썼어요! 여기는 잠시 힘을 얻고 가는 쉼터예요. 물 한 모금 마시고 숨 고를까요?”",
        "<span class='cue'>나눔</span>“함께 찬양 한 곡 부르고, 지금까지 걸어온 길에서 느낀 걸 한 마디씩 나눠 봐요.”",
        "<span class='cue'>파송</span>“이제 힘을 얻었으니, 다음 길을 향해 다시 출발합니다!”",
      ]},
      {t:"note", h:"조 상황에 맞게", items:[
        "출발 전 조(예: 온유 20:02~) — 지나온 코스가 없으니 <b>앞으로의 여정 기대·각오</b> 나눔으로",
        "완주 직후 조(예: 기쁨 21:44~) — <b>전체 여정 되짚기·완주 감사</b>, 마무리 준비로",
        "중간 조 — 지나온 코스 소감 + 다음 코스 예고로",
      ]},
      {t:"check", label:"준비물", items:["찬양 리스트·음향","물·간단한 간식","암송 말씀 카드"]},
    ]},

  // 9. 마무리
  { time:"22:18 ~ 22:28", tag:"마무리 10′ = 기도회", title:"천성에 도착하여", place:"본당", staff:"교역자 (김진서 목사)",
    blocks:[
      {t:"note", h:"이것이 곧 기도회", items:["여름성경학교 1일차에서는 <b>별도 기도회를 두지 않고</b> 이 마무리(통성 기도·은혜 나눔)가 기도회를 겸합니다"]},
      {t:"steps", label:"진행 흐름", items:[
        "① 집결·정돈(2′) — 조별로 모여 앉기, 코스 6의 <b>LED 촛불</b>을 손에",
        "② 여정 되짚기(3′) — 죄 짐 → 십자가 → 생명책 → 이긴 유혹 → 좁은 길 → 사랑의 공동체 (아이들이 코스 이름 외치게)",
        "③ 통성 기도·은혜 나눔(3′) — 결단 봉헌 통성 기도 + 2~3명 은혜 나눔",
        "④ 천국 잔치(2′) — 간식 나누며 축하, 필요 시 완주 상품 전달",
      ]},
      {t:"say", label:"진행 멘트 🎤", items:[
        "<span class='cue'>① 집결</span>“순례자 여러분, 다 모였나요? 손에 든 촛불을 켜고 조용히 모여 앉아요.”",
        "<span class='cue'>② 되짚기</span>“오늘 우리가 걸어온 길을 함께 떠올려 봐요. 무거운 죄 짐을 지고 → 십자가에서 짐을 벗고 → 생명책에 이름이 기록되고 → 말씀으로 유혹을 이기고 → 함께 좁은 길을 걸어 → 사랑의 공동체에 도착했어요. 우리가 오늘 이 길을 다 걸었어요!”",
        "<span class='cue'>③ 통성 기도</span>“이제 우리의 결단을 하나님께 드리는 기도를 함께 드려요.”",
        "<span class='cue'>④ 천국 잔치</span>“천성에 도착한 순례자를 위한 잔치예요! 함께 나누며 축하해요.”",
      ]},
      {t:"note", h:"교사 팁", items:["무섭게 끝내지 말고 <b>기쁨과 감사</b>로 마무리 · 순례 여권 6칸 완주 축하"]},
      {t:"check", label:"준비물", items:["천국 잔치 간식","완주 상품(필요 시)","마무리 찬양 PPT·음향","순례 여권 완주 확인"]},
    ]},
];

const stage = document.getElementById('stage');
const jump = document.getElementById('jump');
let idx = 0;

function blockHTML(b){
  if(b.t==="steps") return `<div class="block"><div class="label">${b.label||"진행"}</div><ul class="steps">${b.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>`;
  if(b.t==="say")   return `<div class="block"><div class="label say-label">${b.label||"진행 멘트 🎤"}</div><div class="say"><ul>${b.items.map(i=>`<li>${i}</li>`).join("")}</ul></div></div>`;
  if(b.t==="check") return `<div class="block">${b.label?`<div class="label">${b.label}</div>`:""}<ul class="check">${b.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>`;
  if(b.t==="note")  return `<div class="block"><div class="note"><span class="h">⚠ ${b.h||"주의"}</span>${b.items.length>1?`<ul>${b.items.map(i=>`<li>${i}</li>`).join("")}</ul>`:b.items[0]}</div></div>`;
  if(b.t==="info")  return `<div class="block"><div class="info">${b.items.map(kv=>`<div><span class="k">${kv[0]}</span> <span>${kv[1]}</span></div>`).join("")}</div></div>`;
  if(b.t==="people")return `<div class="block"><div class="label">${b.label}</div><div class="people">${b.text}</div></div>`;
  if(b.t==="table") return `<div class="block">${b.label?`<div class="label">${b.label}</div>`:""}<div class="tbl-wrap"><table class="rot"><thead><tr>${b.head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${b.rows.map(r=>`<tr>${r.map((c,ci)=>`<td class="${ci>0&&c==="쉼터"?"wait":""}">${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>${b.note?`<div class="ref" style="margin-top:8px">${b.note}</div>`:""}</div>`;
  if(b.t==="ref")   return `<div class="block"><div class="ref">${b.text}</div></div>`;
  return "";
}

function render(){
  document.getElementById('tot').textContent = slots.length;
  document.getElementById('tot2').textContent = slots.length;
  stage.innerHTML = slots.map((s,i)=>`
    <section class="slot" data-i="${i}">
      <div class="slot-head">
        <div class="idx">${String(i+1).padStart(2,'0')} / ${slots.length}</div>
        <div class="time">${s.time}${s.tag?`<span class="tag">${s.tag}</span>`:""}</div>
        <div class="title">${s.title}</div>
        <div class="meta">
          ${s.place?`<span><span class="k">장소</span> ${s.place}</span>`:""}
          ${s.staff?`<span><span class="k">담당</span> ${s.staff}</span>`:""}
        </div>
      </div>
      <div class="slot-body">${s.blocks.map(blockHTML).join("")}</div>
    </section>`).join("");

  jump.innerHTML = slots.map((s,i)=>{
    const label = s.time.includes("코스") ? s.time : (s.tag&&s.tag.includes("오프닝")?"오프닝":s.tag&&s.tag.includes("마무리")?"마무리":s.time);
    return `<span class="chip" data-i="${i}" onclick="show(${i})">${label}</span>`;
  }).join("");
  show(0);
}

function show(i){
  idx = Math.max(0, Math.min(slots.length-1, i));
  document.querySelectorAll('.slot').forEach(el=>el.classList.toggle('active', +el.dataset.i===idx));
  document.querySelectorAll('.chip').forEach(el=>el.classList.toggle('on', +el.dataset.i===idx));
  document.getElementById('cur').textContent = idx+1;
  document.getElementById('cur2').textContent = idx+1;
  const chip = document.querySelector(`.chip[data-i="${idx}"]`);
  if(chip) chip.scrollIntoView({inline:'center', block:'nearest'});
  window.scrollTo({top:0, behavior:'smooth'});
}
function go(d){ show(idx+d); }

document.addEventListener('keydown', e=>{
  if(e.key==="ArrowRight"||e.key==="PageDown") go(1);
  if(e.key==="ArrowLeft"||e.key==="PageUp") go(-1);
  if(e.key==="Home") show(0);
  if(e.key==="End") show(slots.length-1);
});

render();
</script>
</body>
</html>
